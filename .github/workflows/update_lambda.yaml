name: update-lambda-functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  FUNCTION_BUCKET: ${{ secrets.FUNCTION_BUCKET }}

jobs:
  update-lambda-s3:
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v6
      - name: update s3 and lambda
        run: |
          zip tradewind_functions.zip load_sales.py
          aws s3api put-object --region eu-north-1 --bucket $FUNCTION_BUCKET \
            --key tradewind_functions.zip --body tradewind_functions.zip

          aws s3api put-object --region eu-north-1 --bucket $FUNCTION_BUCKET \
            --key etl.py --body etl.py

  update-cfn: 
    runs-on: "ubuntu-latest"
    needs: update-lambda-s3
    steps:
      - name: Repository Dispatch
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.PAT }}
          repository: Koji-Sunioj/tradewinds-cfn
          event-type: updated-function-zip
